<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Screen Usage Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
}

.stat{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

canvas{
background:#020617;
padding:10px;
border-radius:8px;
}

button{
padding:10px 20px;
background:#6366f1;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
border-bottom:1px solid #374151;
}

</style>

</head>

<body>

<h1>📱 Screen Usage Dashboard</h1>

<button onclick="loadData()">Refresh</button>

<div class="grid">

<div class="card">
<h3>Today's Screen Time</h3>
<div id="todayUsage" class="stat">--</div>
</div>

<div class="card">
<h3>Remaining Time</h3>
<div id="remainingTime" class="stat">--</div>
</div>

<div class="card">
<h3>Safety Score</h3>
<div id="safetyScore" class="stat">--</div>
</div>

<div class="card">
<h3>Daily Limit</h3>
<div class="stat">120 min</div>
</div>

</div>

<br>

<div class="grid">

<div class="card">
<h3>Weekly Usage</h3>
<canvas id="weeklyChart"></canvas>
</div>

<div class="card">
<h3>Usage Categories</h3>
<canvas id="categoryChart"></canvas>
</div>

</div>

<br>

<div class="card">

<h3>Top Apps Used</h3>

<table id="appsTable"></table>

</div>


<script>

const API_URL="https://5oc9iuhwl5.execute-api.us-east-1.amazonaws.com/prod/summary?childId=C1"

let weeklyChart
let categoryChart


async function loadData(){

try{

const res = await fetch(API_URL)

if(!res.ok){
throw new Error("API request failed")
}

const result = await res.json()

const data = result.body ? JSON.parse(result.body) : result

const apps = data.apps || []


let total = 0

let gaming = 0
let video = 0
let social = 0
let learning = 0


apps.forEach(app=>{

total += app.minutes

const name = app.app.toLowerCase()

if(name.includes("youtube"))
video += app.minutes

else if(name.includes("instagram"))
social += app.minutes

else if(name.includes("game") || name.includes("mahjong"))
gaming += app.minutes

else
learning += app.minutes

})


const dailyLimit = 120

const remaining = Math.max(dailyLimit-total,0)


// simple safety score

let score = 100

if(total>dailyLimit) score-=30
if(social>60) score-=20
if(gaming>60) score-=20
if(video>90) score-=15

score = Math.max(score,10)


// update UI

document.getElementById("todayUsage").innerText = total+" min"
document.getElementById("remainingTime").innerText = remaining+" min"
document.getElementById("safetyScore").innerText = score+" %"



// weekly data

const weekly=[
Math.round(total*0.6),
Math.round(total*0.7),
Math.round(total*0.5),
Math.round(total*0.8),
Math.round(total*0.4),
Math.round(total*0.6),
total
]


if(weeklyChart) weeklyChart.destroy()

weeklyChart = new Chart(
document.getElementById("weeklyChart"),
{
type:"bar",
data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
label:"Minutes",
data:weekly,
backgroundColor:"#6366f1"
}]
}
}
)



// category chart

if(categoryChart) categoryChart.destroy()

categoryChart = new Chart(
document.getElementById("categoryChart"),
{
type:"doughnut",
data:{
labels:["Gaming","Video","Social","Learning"],
datasets:[{
data:[gaming,video,social,learning],
backgroundColor:[
"#6366f1",
"#ef4444",
"#f59e0b",
"#22c55e"
]
}]
}
}
)


// app table

const table = document.getElementById("appsTable")

table.innerHTML=""

apps.forEach(app=>{

table.innerHTML += `
<tr>
<td>${app.app}</td>
<td>${app.minutes} min</td>
</tr>
`

})


}catch(err){

console.error(err)

alert("Failed to fetch data from API")

}

}

loadData()

</script>

</body>

</html>
