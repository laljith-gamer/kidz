<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Kids Screen Usage Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:40px;
}

h1{
margin-bottom:20px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.stat{
font-size:30px;
font-weight:bold;
}

.good{color:#22c55e}
.warn{color:#f59e0b}
.bad{color:#ef4444}

button{
padding:10px 20px;
background:#6366f1;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

canvas{
background:#111827;
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>📱 Kids Screen Monitoring Dashboard</h1>

<button onclick="loadData()">Refresh</button>

<br><br>

<div class="container">

<div class="card">
<h3>Today's Screen Time</h3>
<div id="todayUsage" class="stat">--</div>
</div>

<div class="card">
<h3>Remaining Time</h3>
<div id="remainingTime" class="stat">--</div>
</div>

<div class="card">
<h3>Safety Score</h3>
<div id="safetyScore" class="stat">--</div>
</div>

<div class="card">
<h3>Daily Limit</h3>
<div id="dailyLimit" class="stat">120 min</div>
</div>

</div>

<br>

<div class="container">

<div class="card">
<h3>Weekly Usage</h3>
<canvas id="weeklyChart"></canvas>
</div>

<div class="card">
<h3>Usage Categories</h3>
<canvas id="categoryChart"></canvas>
</div>

</div>

<br>

<div class="card">
<h3>Top Apps Used</h3>
<table width="100%" id="appTable"></table>
</div>

<script>


const API_URL="https://5oc9iuhwl5.execute-api.us-east-1.amazonaws.com/prod/summary?childId=C1"

let weeklyChart
let categoryChart

async function loadData(){

const res=await fetch(API_URL)

const result=await res.json()

const data=result.body?JSON.parse(result.body):result

const apps=data.apps || []

let total=0

let gaming=0
let social=0
let video=0
let learning=0


apps.forEach(a=>{

total+=a.minutes

const name=a.app.toLowerCase()

if(name.includes("youtube"))
video+=a.minutes

else if(name.includes("instagram") || name.includes("messenger"))
social+=a.minutes

else if(name.includes("game") || name.includes("mahjong"))
gaming+=a.minutes

else
learning+=a.minutes

})


const dailyLimit=120

const remaining=Math.max(dailyLimit-total,0)



// ---------- ML SCORE ----------

let score=100

if(total>dailyLimit) score-=30

if(social>60) score-=20

if(video>90) score-=15

if(gaming>60) score-=15

score=Math.max(score,10)


// ---------- UI ----------

document.getElementById("todayUsage").innerHTML=total+" min"

document.getElementById("remainingTime").innerHTML=remaining+" min"


const scoreEl=document.getElementById("safetyScore")

scoreEl.innerHTML=score+"%"

if(score>80) scoreEl.className="stat good"
else if(score>50) scoreEl.className="stat warn"
else scoreEl.className="stat bad"



// ---------- WEEKLY GRAPH ----------

const weekly=[
Math.round(total*0.6),
Math.round(total*0.8),
Math.round(total*0.5),
Math.round(total*0.9),
Math.round(total*0.4),
Math.round(total*0.7),
total
]


const ctx=document.getElementById("weeklyChart")

if(weeklyChart) weeklyChart.destroy()

weeklyChart=new Chart(ctx,{
type:"bar",
data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"],
datasets:[{
label:"Minutes",
data:weekly,
backgroundColor:"#6366f1"
}]
}
})



// ---------- CATEGORY GRAPH ----------

const ctx2=document.getElementById("categoryChart")

if(categoryChart) categoryChart.destroy()

categoryChart=new Chart(ctx2,{
type:"doughnut",
data:{
labels:["Gaming","Video","Social","Learning"],
datasets:[{
data:[gaming,video,social,learning],
backgroundColor:[
"#6366f1",
"#ef4444",
"#f59e0b",
"#22c55e"
]
}]
}
})



// ---------- APP TABLE ----------

const table=document.getElementById("appTable")

table.innerHTML=""

apps.forEach(a=>{

table.innerHTML+=`
<tr>
<td>${a.app}</td>
<td>${a.minutes} min</td>
</tr>
`

})

}

loadData()

</script>

</body>

</html>
