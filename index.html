```html
<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeKids AI Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#06080f;
  color:white;
  font-family:'Inter',Arial,sans-serif;
  padding:0;
  min-height:100vh;
  overflow-x:hidden;
}

/* === ANIMATED BACKGROUND === */
.bg-mesh{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
  overflow:hidden;
}

.bg-blob{
  position:absolute;border-radius:50%;filter:blur(120px);opacity:0.35;
  animation:blobDrift 20s ease-in-out infinite alternate;
}
.bg-blob:nth-child(1){
  width:500px;height:500px;
  background:radial-gradient(circle,#6366f1,#4f46e5);
  top:-10%;left:-5%;
  animation-duration:22s;
}
.bg-blob:nth-child(2){
  width:400px;height:400px;
  background:radial-gradient(circle,#ec4899,#be185d);
  bottom:10%;right:-10%;
  animation-duration:18s;animation-delay:3s;
}
.bg-blob:nth-child(3){
  width:350px;height:350px;
  background:radial-gradient(circle,#06b6d4,#0891b2);
  top:50%;left:40%;
  animation-duration:25s;animation-delay:6s;
}

@keyframes blobDrift{
  0%{transform:translate(0,0) scale(1) rotate(0deg)}
  25%{transform:translate(60px,-40px) scale(1.15) rotate(5deg)}
  50%{transform:translate(-30px,70px) scale(0.9) rotate(-3deg)}
  75%{transform:translate(40px,30px) scale(1.1) rotate(4deg)}
  100%{transform:translate(-50px,-60px) scale(1.05) rotate(-2deg)}
}

/* === LAYOUT === */
.page-wrapper{
  position:relative;z-index:1;
  max-width:1280px;margin:auto;padding:30px 20px 60px;
}

/* Header */
.header{
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;
  padding:28px 35px;margin-bottom:30px;
  background:linear-gradient(135deg,rgba(15,20,40,0.7),rgba(10,14,30,0.85));
  backdrop-filter:blur(30px);
  border:1px solid rgba(99,102,241,0.12);
  border-radius:22px;
}

.header-left h1{
  font-size:26px;font-weight:800;
}

.header-left p{color:#64748b;font-size:13px;margin-top:4px}

.live-badge{
  display:flex;align-items:center;gap:8px;
  padding:10px 24px;border-radius:50px;
  background:linear-gradient(135deg,rgba(34,197,94,0.12),rgba(34,197,94,0.04));
  border:1px solid rgba(34,197,94,0.25);
  font-size:12px;font-weight:700;color:#4ade80;
}

.live-dot{
  width:9px;height:9px;border-radius:50%;background:#4ade80;
  box-shadow:0 0 12px #4ade80;
}

/* === STAT CARDS === */
.stat-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;margin-bottom:25px;
}

.card{
  background:linear-gradient(145deg,rgba(15,20,40,0.55),rgba(10,14,30,0.75));
  padding:24px 26px;border-radius:18px;
  border:1px solid rgba(99,102,241,0.08);
}

.card-icon{
  width:42px;height:42px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;margin-bottom:14px;
}

.card-label{
  font-size:12px;color:#64748b;
  text-transform:uppercase;margin-bottom:6px;
}

.value{
  font-size:26px;font-weight:700;
}

/* === CHART SECTION === */
.chart-section{
  background:linear-gradient(145deg,rgba(15,20,40,0.55),rgba(10,14,30,0.75));
  padding:30px;border-radius:20px;
  border:1px solid rgba(99,102,241,0.08);
  margin-bottom:25px;
}

.chart-section-title{
  font-size:16px;font-weight:600;margin-bottom:20px;
}

/* === LOGS SECTION === */
.logs-section{
  background:linear-gradient(145deg,rgba(15,20,40,0.55),rgba(10,14,30,0.75));
  padding:30px;border-radius:20px;
  border:1px solid rgba(99,102,241,0.08);
}

.log{
  border-bottom:1px solid rgba(51,65,85,0.35);
  padding:13px 16px;
  display:flex;justify-content:space-between;align-items:center;
}

.log-name{
  display:flex;align-items:center;gap:10px;font-weight:500;
}

.log-dot{
  width:7px;height:7px;border-radius:50%;
  background:#6366f1;
}

.log-badge{
  font-size:12px;font-weight:600;color:#a5b4fc;
  background:rgba(99,102,241,0.1);
  padding:4px 14px;border-radius:20px;
}

</style>
</head>

<body>

<div class="bg-mesh">
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
  <div class="bg-blob"></div>
</div>

<div class="page-wrapper">

<header class="header">
  <div class="header-left">
    <h1>🛡️ SafeKids AI Monitor</h1>
    <p>Intelligent Child Device Analytics & Protection</p>
  </div>
  <div class="live-badge">
    <div class="live-dot"></div>
    LIVE
  </div>
</header>

<div class="stat-grid">

  <div class="card">
    <div class="card-icon">⏱️</div>
    <div class="card-label">Total Screen Time</div>
    <div id="usage" class="value">—</div>
  </div>

  <div class="card">
    <div class="card-icon">📦</div>
    <div class="card-label">Apps Used</div>
    <div id="apps" class="value">—</div>
  </div>

  <div class="card">
    <div class="card-icon">🏆</div>
    <div class="card-label">Top App</div>
    <div id="topApp" class="value">—</div>
  </div>

  <div class="card">
    <div class="card-icon">⚠️</div>
    <div class="card-label">AI Risk Level</div>
    <div id="risk" class="value">—</div>
  </div>

  <div class="card">
    <div class="card-icon">📊</div>
    <div class="card-label">AI Risk Score</div>
    <div id="riskScore" class="value">—</div>
  </div>

</div>

<div class="chart-section">
  <div class="chart-section-title">📊 App Usage Breakdown</div>
  <canvas id="chart"></canvas>
</div>

<div class="logs-section">
  <h3>📋 Recent Apps</h3>
  <div id="logList">Loading data...</div>
</div>

</div>

<script>

const API_URL="https://ozct5tcexuytwcxr7g34yb75ru0juafl.lambda-url.us-east-1.on.aws/"

let chart

function formatAppName(pkg){
if(!pkg) return "Unknown"
const parts=pkg.split(".")
const name=parts[parts.length-1]
return name.charAt(0).toUpperCase()+name.slice(1)
}

/* ---------- MERGE DUPLICATE APPS ---------- */

function mergeApps(apps){

const map={}

apps.forEach(a=>{
if(!map[a.app]) map[a.app]=0
map[a.app]+=a.usageMinutes
})

return Object.keys(map).map(k=>({
app:k,
usageMinutes:map[k]
}))

}

/* ---------- LOGS ---------- */

function renderLogs(apps){

const container=document.getElementById("logList")

if(!apps||apps.length===0){
container.innerHTML="No recent activity"
return
}

container.innerHTML=apps.map(a=>`
<div class="log">
<span class="log-name"><span class="log-dot"></span>${formatAppName(a.app)}</span>
<span class="log-badge">${a.usageMinutes} min</span>
</div>
`).join("")

}

/* ---------- CHART ---------- */

function renderChart(apps){

const ctx=document.getElementById("chart")

if(!apps||apps.length===0) return

const labels=apps.map(a=>formatAppName(a.app))
const values=apps.map(a=>a.usageMinutes)

if(chart) chart.destroy()

chart=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Usage Minutes",
data:values,
backgroundColor:"rgba(99,102,241,0.8)",
borderColor:"#818cf8",
borderWidth:2
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}},
scales:{y:{beginAtZero:true}}
}
})

}

/* ---------- LOAD DATA ---------- */

async function loadData(){

const res=await fetch(API_URL+"?t="+Date.now())
const data=await res.json()

document.getElementById("usage").innerText=(data.totalUsageMinutes||0)+" min"
document.getElementById("apps").innerText=data.appsUsed||0
document.getElementById("topApp").innerText=formatAppName(data.topApp)
document.getElementById("risk").innerText=data.risk_level
document.getElementById("riskScore").innerText=((data.risk_score||0)*100).toFixed(0)+"%"

/* merge duplicates */

const apps=mergeApps(data.recentApps)

/* render */

renderLogs(apps)
renderChart(apps)

}

loadData()

setInterval(loadData,5000)

</script>

</body>
</html>
```
