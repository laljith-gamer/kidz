<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeKids Usage Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins', sans-serif;
  background:#070b1a;
  color:white;
  margin:0;
  padding:20px;
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';
  position:fixed;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(59,130,246,0.05) 0%, transparent 50%);
  animation:bgShift 20s ease-in-out infinite alternate;
  z-index:0;
  pointer-events:none;
}

@keyframes bgShift{
  0%{transform:translate(0,0) rotate(0deg)}
  33%{transform:translate(2%,-2%) rotate(1deg)}
  66%{transform:translate(-1%,3%) rotate(-1deg)}
  100%{transform:translate(1%,-1%) rotate(0.5deg)}
}

/* Floating Orbs */
.orb{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.4;
  pointer-events:none;
  z-index:0;
}

.orb-1{
  width:300px;height:300px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  top:10%;left:5%;
  animation:orbFloat1 15s ease-in-out infinite;
}

.orb-2{
  width:250px;height:250px;
  background:linear-gradient(135deg,#3b82f6,#06b6d4);
  bottom:15%;right:10%;
  animation:orbFloat2 18s ease-in-out infinite;
}

.orb-3{
  width:200px;height:200px;
  background:linear-gradient(135deg,#8b5cf6,#ec4899);
  top:60%;left:50%;
  animation:orbFloat3 12s ease-in-out infinite;
}

@keyframes orbFloat1{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(50px,30px) scale(1.1)}
  50%{transform:translate(20px,-40px) scale(0.9)}
  75%{transform:translate(-30px,20px) scale(1.05)}
}

@keyframes orbFloat2{
  0%,100%{transform:translate(0,0) scale(1)}
  25%{transform:translate(-40px,-20px) scale(1.05)}
  50%{transform:translate(30px,50px) scale(0.95)}
  75%{transform:translate(20px,-30px) scale(1.1)}
}

@keyframes orbFloat3{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(-60px,40px) scale(1.15)}
  66%{transform:translate(40px,-50px) scale(0.9)}
}

/* Particles */
.particles{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.particle{
  position:absolute;
  width:3px;height:3px;
  background:rgba(99,102,241,0.6);
  border-radius:50%;
  animation:particleRise linear infinite;
}

@keyframes particleRise{
  0%{transform:translateY(100vh) scale(0);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-10vh) scale(1);opacity:0}
}

.container{
  max-width:1200px;
  margin:auto;
  position:relative;
  z-index:1;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:linear-gradient(135deg,rgba(30,41,59,0.6),rgba(15,23,42,0.8));
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:28px 35px;
  border-radius:20px;
  margin-bottom:25px;
  border:1px solid rgba(99,102,241,0.15);
  box-shadow:
    0 0 40px rgba(99,102,241,0.05),
    0 20px 60px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.05);
  animation:headerSlide 0.8s cubic-bezier(0.16,1,0.3,1) both;
  position:relative;
  overflow:hidden;
}

header::before{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:200%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(99,102,241,0.03),transparent);
  animation:headerShine 6s ease-in-out infinite;
}

@keyframes headerShine{
  0%,100%{transform:translateX(-50%)}
  50%{transform:translateX(50%)}
}

@keyframes headerSlide{
  from{opacity:0;transform:translateY(-30px)}
  to{opacity:1;transform:translateY(0)}
}

header h2{
  font-size:24px;
  font-weight:700;
  background:linear-gradient(135deg,#fff,#c7d2fe);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  letter-spacing:-0.5px;
}

header p{
  color:#94a3b8;
  font-size:14px;
  margin-top:5px;
  font-weight:300;
  letter-spacing:0.5px;
}

#status{
  display:flex;
  align-items:center;
  gap:10px;
  background:linear-gradient(135deg,rgba(34,197,94,0.15),rgba(34,197,94,0.05));
  padding:10px 22px;
  border-radius:50px;
  font-size:13px;
  font-weight:600;
  letter-spacing:2px;
  border:1px solid rgba(34,197,94,0.3);
  color:#4ade80;
  position:relative;
}

#status::before{
  content:'';
  width:10px;height:10px;
  background:#4ade80;
  border-radius:50%;
  display:block;
  animation:pulse 2s ease-in-out infinite;
  box-shadow:0 0 10px #4ade80;
}

@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 10px #4ade80}
  50%{opacity:0.5;transform:scale(1.3);box-shadow:0 0 25px #4ade80,0 0 50px rgba(74,222,128,0.3)}
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:20px;
  margin-bottom:25px;
}

.card{
  background:linear-gradient(135deg,rgba(30,41,59,0.5),rgba(15,23,42,0.7));
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:25px 28px;
  border-radius:18px;
  border:1px solid rgba(99,102,241,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
  transition:all 0.4s cubic-bezier(0.16,1,0.3,1);
  position:relative;
  overflow:hidden;
  cursor:default;
  animation:cardAppear 0.8s cubic-bezier(0.16,1,0.3,1) both;
}

.card:nth-child(1){animation-delay:0.1s}
.card:nth-child(2){animation-delay:0.2s}
.card:nth-child(3){animation-delay:0.3s}
.card:nth-child(4){animation-delay:0.4s}

.card::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  border-radius:3px 3px 0 0;
  transition:all 0.4s ease;
}

.card:nth-child(1)::before{background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.card:nth-child(2)::before{background:linear-gradient(90deg,#3b82f6,#06b6d4)}
.card:nth-child(3)::before{background:linear-gradient(90deg,#8b5cf6,#ec4899)}
.card:nth-child(4)::before{background:linear-gradient(90deg,#f59e0b,#ef4444)}

.card::after{
  content:'';
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:linear-gradient(135deg,rgba(99,102,241,0.05),transparent);
  opacity:0;
  transition:opacity 0.4s ease;
  pointer-events:none;
}

.card:hover::after{opacity:1}

.card:hover{
  transform:translateY(-8px) scale(1.02);
  border-color:rgba(99,102,241,0.3);
  box-shadow:
    0 20px 60px rgba(99,102,241,0.15),
    0 8px 32px rgba(0,0,0,0.3);
}

.card:hover::before{
  height:4px;
  filter:brightness(1.3);
}

@keyframes cardAppear{
  from{opacity:0;transform:translateY(40px) scale(0.95)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

.card-icon{
  width:45px;height:45px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  margin-bottom:15px;
}

.card:nth-child(1) .card-icon{background:linear-gradient(135deg,rgba(99,102,241,0.2),rgba(139,92,246,0.1))}
.card:nth-child(2) .card-icon{background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(6,182,212,0.1))}
.card:nth-child(3) .card-icon{background:linear-gradient(135deg,rgba(139,92,246,0.2),rgba(236,72,153,0.1))}
.card:nth-child(4) .card-icon{background:linear-gradient(135deg,rgba(245,158,11,0.2),rgba(239,68,68,0.1))}

.card-label{
  font-size:13px;
  color:#94a3b8;
  font-weight:400;
  letter-spacing:0.5px;
  text-transform:uppercase;
  margin-bottom:8px;
}

.value{
  font-size:28px;
  font-weight:700;
  margin-top:0;
  letter-spacing:-0.5px;
  transition:all 0.3s ease;
}

.card:nth-child(1) .value{
  background:linear-gradient(135deg,#818cf8,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.card:nth-child(2) .value{
  background:linear-gradient(135deg,#60a5fa,#22d3ee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.card:nth-child(3) .value{
  background:linear-gradient(135deg,#a78bfa,#f472b6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.card:nth-child(4) .value{
  background:linear-gradient(135deg,#fbbf24,#f87171);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.chart-container{
  background:linear-gradient(135deg,rgba(30,41,59,0.5),rgba(15,23,42,0.7));
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:30px;
  border-radius:20px;
  border:1px solid rgba(99,102,241,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
  animation:cardAppear 0.8s cubic-bezier(0.16,1,0.3,1) 0.5s both;
  position:relative;
  overflow:hidden;
}

.chart-container::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,#6366f1,#8b5cf6,#ec4899,#3b82f6);
  background-size:300% 100%;
  animation:gradientMove 4s ease infinite;
}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.chart-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.chart-title{
  font-size:18px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
}

.chart-title span{
  font-size:20px;
}

.logs{
  background:linear-gradient(135deg,rgba(30,41,59,0.5),rgba(15,23,42,0.7));
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  padding:30px;
  border-radius:20px;
  margin-top:20px;
  border:1px solid rgba(99,102,241,0.1);
  box-shadow:0 8px 32px rgba(0,0,0,0.2);
  animation:cardAppear 0.8s cubic-bezier(0.16,1,0.3,1) 0.6s both;
  position:relative;
  overflow:hidden;
}

.logs::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,#06b6d4,#3b82f6,#6366f1);
  background-size:300% 100%;
  animation:gradientMove 4s ease infinite;
}

.logs h3{
  font-size:18px;
  font-weight:600;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:10px;
}

.logs h3 span{
  font-size:20px;
}

.log{
  padding:14px 18px;
  border-bottom:1px solid rgba(51,65,85,0.5);
  font-size:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:all 0.3s ease;
  border-radius:10px;
  margin-bottom:4px;
  animation:logSlide 0.5s cubic-bezier(0.16,1,0.3,1) both;
  position:relative;
  overflow:hidden;
}

.log::before{
  content:'';
  position:absolute;
  left:0;top:0;
  width:3px;height:100%;
  background:linear-gradient(180deg,#6366f1,#8b5cf6);
  border-radius:3px;
  opacity:0;
  transition:opacity 0.3s ease;
}

.log:hover::before{opacity:1}

.log:hover{
  background:rgba(99,102,241,0.06);
  border-color:rgba(99,102,241,0.15);
  padding-left:24px;
}

.log:last-child{border-bottom:none}

@keyframes logSlide{
  from{opacity:0;transform:translateX(-20px)}
  to{opacity:1;transform:translateX(0)}
}

.log-app{
  font-weight:500;
  display:flex;
  align-items:center;
  gap:10px;
}

.log-app::before{
  content:'';
  width:8px;height:8px;
  border-radius:50%;
  background:#6366f1;
  display:block;
  box-shadow:0 0 8px rgba(99,102,241,0.5);
}

.log-time{
  color:#818cf8;
  font-weight:600;
  font-size:13px;
  background:rgba(99,102,241,0.1);
  padding:5px 14px;
  border-radius:20px;
  border:1px solid rgba(99,102,241,0.15);
}

/* Grid lines bg */
.grid-bg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background-image:
    linear-gradient(rgba(99,102,241,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(99,102,241,0.03) 1px,transparent 1px);
  background-size:60px 60px;
  z-index:0;
  pointer-events:none;
  animation:gridPan 30s linear infinite;
}

@keyframes gridPan{
  0%{transform:translate(0,0)}
  100%{transform:translate(60px,60px)}
}

/* Scrollbar */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:rgba(15,23,42,0.5)}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(99,102,241,0.5)}

/* Loading shimmer */
.loading-text{
  background:linear-gradient(90deg,#94a3b8 25%,#cbd5e1 50%,#94a3b8 75%);
  background-size:200% 100%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 1.5s ease-in-out infinite;
}

@keyframes shimmer{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}

/* Responsive */
@media(max-width:768px){
  header{
    flex-direction:column;
    gap:15px;
    text-align:center;
    padding:20px;
  }
  header h2{font-size:20px}
  .cards{grid-template-columns:1fr 1fr}
  .value{font-size:22px}
  body{padding:12px}
}

@media(max-width:480px){
  .cards{grid-template-columns:1fr}
  .chart-container,.logs{padding:20px}
}

</style>

</head>

<body>

<div class="grid-bg"></div>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="particles" id="particles"></div>

<div class="container">

<header>
<div>
<h2>📱 SafeKids Monitoring Dashboard</h2>
<p>Child Device Usage Analytics</p>
</div>

<div id="status">LIVE</div>

</header>


<div class="cards">

<div class="card">
<div class="card-icon">⏱️</div>
<div class="card-label">Total Screen Time</div>
<div class="value" id="usage">0</div>
</div>

<div class="card">
<div class="card-icon">📦</div>
<div class="card-label">Apps Used</div>
<div class="value" id="apps">0</div>
</div>

<div class="card">
<div class="card-icon">🏆</div>
<div class="card-label">Most Used App</div>
<div class="value" id="topApp">--</div>
</div>

<div class="card">
<div class="card-icon">🕐</div>
<div class="card-label">Last Updated</div>
<div class="value" id="updated">--</div>
</div>

</div>

<div class="chart-container">
<div class="chart-header">
<div class="chart-title"><span>📊</span> App Usage Breakdown</div>
</div>
<canvas id="chart"></canvas>
</div>

<div class="logs">

<h3><span>📋</span> Recent Apps Used</h3>

<div id="logList">
<span class="loading-text">Loading data...</span>
</div>

</div>

</div>


<script>

// Generate particles
(function(){
  const container = document.getElementById('particles');
  for(let i=0;i<30;i++){
    const p = document.createElement('div');
    p.className='particle';
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(8+Math.random()*12)+'s';
    p.style.animationDelay=Math.random()*10+'s';
    p.style.width=p.style.height=(1+Math.random()*3)+'px';
    p.style.opacity=0.2+Math.random()*0.5;
    const colors=['rgba(99,102,241,0.6)','rgba(139,92,246,0.5)','rgba(59,130,246,0.5)','rgba(236,72,153,0.4)'];
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    container.appendChild(p);
  }
})();

const API_URL =
"https://ozct5tcexuytwcxr7g34yb75ru0juafl.lambda-url.us-east-1.on.aws/ ";

let chart;

async function loadData(){

try{

const res = await fetch(API_URL);
const data = await res.json();

document.getElementById("usage").innerText =
data.totalUsageMinutes+" min";

document.getElementById("apps").innerText =
data.appsUsed;

document.getElementById("topApp").innerText =
data.topApp;

document.getElementById("updated").innerText =
new Date(data.lastUpdated).toLocaleTimeString();

renderLogs(data.recentApps);
renderChart(data.recentApps);

}catch(err){

console.error(err);

}

}


function renderLogs(apps){

const container = document.getElementById("logList");

if(!apps || apps.length===0){

container.innerHTML="No data yet";
return;

}

container.innerHTML = apps.map((a,i)=>`

<div class="log" style="animation-delay:${i*0.08}s">

<span class="log-app">${a.app}</span>

<span class="log-time">${a.usageMinutes} min</span>

</div>

`).join("");

}


function renderChart(apps){

const ctx = document.getElementById("chart");

const labels = apps.map(a=>a.app.split(".").pop());

const values = apps.map(a=>a.usageMinutes);

if(chart) chart.destroy();

chart = new Chart(ctx,{

type:"bar",

data:{

labels:labels,

datasets:[{

label:"Usage Minutes",

data:values,

backgroundColor: function(context){
  const gradient = context.chart.ctx.createLinearGradient(0,0,0,context.chart.height);
  gradient.addColorStop(0,'rgba(99,102,241,0.8)');
  gradient.addColorStop(1,'rgba(139,92,246,0.2)');
  return gradient;
},

borderColor:'rgba(99,102,241,0.9)',

borderWidth:2,

borderRadius:8,

borderSkipped:false,

hoverBackgroundColor:'rgba(129,140,248,0.9)',

}]

},

options:{

responsive:true,

animation:{
  duration:1200,
  easing:'easeOutQuart'
},

plugins:{

legend:{
  display:false
},

tooltip:{
  backgroundColor:'rgba(15,23,42,0.95)',
  titleColor:'#c7d2fe',
  bodyColor:'#e2e8f0',
  borderColor:'rgba(99,102,241,0.3)',
  borderWidth:1,
  cornerRadius:12,
  padding:14,
  titleFont:{family:'Poppins',weight:'600'},
  bodyFont:{family:'Poppins'},
  displayColors:false
}

},

scales:{

x:{
  grid:{color:'rgba(51,65,85,0.3)',drawBorder:false},
  ticks:{color:'#94a3b8',font:{family:'Poppins',size:12}}
},

y:{
  grid:{color:'rgba(51,65,85,0.2)',drawBorder:false},
  ticks:{color:'#94a3b8',font:{family:'Poppins',size:12}},
  beginAtZero:true
}

}

}

});

}


loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
