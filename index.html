<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeKids | AI Content Safety Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #334155;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .stat-val {
            font-size: 32px;
            font-weight: 700;
            margin: 10px 0;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .ml-score {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .score-safe { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .score-warn { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid var(--warning); }
        .score-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .chart-container {
            background: var(--card);
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            padding: 12px;
            color: #94a3b8;
            font-weight: 600;
            border-bottom: 1px solid #334155;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
        }

        .app-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading"></div>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fas fa-shield-child"></i>
                SafeKids AI Monitor
            </div>
            <div id="last-update" style="color: #94a3b8; font-size: 13px;"></div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="stat-label">Total Screen Time</div>
                <div class="stat-val" id="total-time">0h 0m</div>
                <div class="ml-score score-safe" id="time-status">Within Daily Limit</div>
            </div>
            <div class="card">
                <div class="stat-label">Safety Score (ML)</div>
                <div class="stat-val" id="safety-score">--</div>
                <div id="safety-indicator" class="ml-score">Analyzing Content...</div>
            </div>
            <div class="card">
                <div class="stat-label">Active Alerts</div>
                <div class="stat-val" id="alert-count" style="color: var(--danger);">0</div>
                <div class="ml-score score-danger">Critical Attention Needed</div>
            </div>
        </div>

        <div class="grid" style="grid-template-columns: 2fr 1fr;">
            <div class="chart-container">
                <h3 style="margin-top: 0;">Usage Trends (Last 7 Days)</h3>
                <canvas id="usageChart" height="200"></canvas>
            </div>
            <div class="card">
                <h3 style="margin-top: 0;">Top Restricted Apps</h3>
                <div id="top-apps">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top: 0;">Recent Activity Logs</h3>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Application</th>
                        <th>ML Toxicity Score</th>
                        <th>Safety Status</th>
                        <th>Action Taken</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    <!-- Logs will appear here -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://ozctl5tcexuytwcxr7g34yb75ru0juafl.lambda-url.us-east-1.on.aws/';
        
        async function fetchData() {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error('Fetch error:', error);
                // Fallback to sample data if API fails
                updateUI(getSampleData());
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('last-update').innerText = 'Last updated: ' + new Date().toLocaleTimeString();
            }
        }

        function updateUI(data) {
            // Update Stats
            document.getElementById('total-time').innerText = data.total_time || '4h 12m';
            document.getElementById('safety-score').innerText = (data.safety_score || 94) + '%';
            document.getElementById('alert-count').innerText = data.alerts || '2';
            
            const safetyInd = document.getElementById('safety-indicator');
            const score = data.safety_score || 94;
            if(score > 80) {
                safetyInd.className = 'ml-score score-safe';
                safetyInd.innerText = 'Safe Content Detected';
            } else if(score > 50) {
                safetyInd.className = 'ml-score score-warn';
                safetyInd.innerText = 'Moderate Risk';
            } else {
                safetyInd.className = 'ml-score score-danger';
                safetyInd.innerText = 'High Toxicity Alert';
            }

            // Update Chart
            updateChart(data.usage_history || [45, 120, 80, 150, 60, 200, 180]);

            // Update Logs
            const tbody = document.getElementById('logs-body');
            tbody.innerHTML = (data.recent_logs || []).map(log => `
                <tr>
                    <td>${log.timestamp}</td>
                    <td style="display: flex; align-items: center;">
                        <div class="app-icon"><i class="fab fa-${log.app.toLowerCase()}"></i></div>
                        ${log.app}
                    </td>
                    <td>
                        <div style="width: 100px; height: 8px; background: #334155; border-radius: 4px; overflow: hidden;">
                            <div style="width: ${log.toxicity}%; height: 100%; background: ${log.toxicity > 50 ? 'var(--danger)' : 'var(--success)'}"></div>
                        </div>
                        <span style="font-size: 10px; color: #94a3b8;">${log.toxicity}% Toxicity</span>
                    </td>
                    <td><span class="badge" style="background: ${log.status === 'Safe' ? 'rgba(16,185,129,0.1); color: var(--success);' : 'rgba(239,68,68,0.1); color: var(--danger);'}">${log.status}</span></td>
                    <td>${log.action}</td>
                </tr>
            `).join('');
        }

        let myChart;
        function updateChart(history) {
            const ctx = document.getElementById('usageChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        label: 'Usage Minutes',
                        data: history,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });
        }

        function getSampleData() {
            return {
                total_time: '5h 45m',
                safety_score: 92,
                alerts: 1,
                usage_history: [60, 90, 45, 120, 30, 210, 180],
                recent_logs: [
                    { timestamp: '10:15 AM', app: 'YouTube', toxicity: 12, status: 'Safe', action: 'Monitored' },
                    { timestamp: '11:30 AM', app: 'Discord', toxicity: 68, status: 'Risk', action: 'Alert Sent' },
                    { timestamp: '01:45 PM', app: 'Roblox', toxicity: 5, status: 'Safe', action: 'Monitored' }
                ]
            };
        }

        fetchData();
        setInterval(fetchData, 30000); // Auto-refresh every 30s
    </script>
</body>
</html>
