<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeKids AI Monitoring Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.value{
font-size:28px;
font-weight:bold;
margin-top:10px;
color:#6366f1;
}

.logs{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.log{
padding:10px;
border-bottom:1px solid #334155;
font-size:14px;
}

.safe{color:#10b981;}
.warning{color:#f59e0b;}
.danger{color:#ef4444;}

</style>
</head>

<body>

<div class="container">

<header>
<div>
<h2>🛡 SafeKids AI Monitor</h2>
<p style="color:#94a3b8">Real-time AI Safety Monitoring</p>
</div>

<div id="status">LIVE</div>
</header>

<div class="cards">

<div class="card">
<div>Total Events</div>
<div class="value" id="events">0</div>
</div>

<div class="card">
<div>Safety Score</div>
<div class="value" id="safety">--</div>
</div>

<div class="card">
<div>Alerts</div>
<div class="value" id="alerts">0</div>
</div>

<div class="card">
<div>Last Updated</div>
<div class="value" id="updated">--</div>
</div>

</div>

<canvas id="chart"></canvas>

<div class="logs">
<h3>AI Security Logs</h3>
<div id="logList">Loading...</div>
</div>

</div>

<script>

const API_URL =
"https://ozct5tcexuytwcxr7g34yb75ru0juafl.lambda-url.us-east-1.on.aws/";

let chart;

async function loadData(){

try{

const res = await fetch(API_URL);
const data = await res.json();

document.getElementById("events").innerText =
data.total_events;

document.getElementById("alerts").innerText =
data.alerts;

document.getElementById("updated").innerText =
new Date(data.lastUpdated).toLocaleTimeString();

document.getElementById("safety").innerText =
Math.round(data.safety_score)+"%";

renderLogs(data.recent_logs);
renderChart(data.recent_logs);

}catch(err){
console.error(err);
}

}

function renderLogs(logs){

const container = document.getElementById("logList");

if(!logs || logs.length===0){
container.innerHTML="No activity yet";
return;
}

container.innerHTML = logs.map(l=>{

let cls="safe";

if(l.risk==="HIGH") cls="danger";
if(l.risk==="MEDIUM") cls="warning";

return `
<div class="log">
<span>${l.timestamp}</span> —
${l.message}
<b class="${cls}">${l.risk}</b>
</div>
`;

}).join("");

}

function renderChart(logs){

const ctx=document.getElementById("chart");

const values = logs.map(l=>parseFloat(l.toxicity)*100);

if(chart) chart.destroy();

chart = new Chart(ctx,{
type:"line",
data:{
labels:logs.map((_,i)=>"Event "+(i+1)),
datasets:[{
label:"Toxicity %",
data:values,
borderColor:"#6366f1",
backgroundColor:"rgba(99,102,241,0.2)",
fill:true
}]
}
});

}

loadData();
setInterval(loadData,5000);

</script>

</body>
</html>
