<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeKids Usage Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

header{
display:flex;
justify-content:space-between;
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.value{
font-size:30px;
font-weight:bold;
margin-top:10px;
color:#6366f1;
}

.logs{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.log{
padding:10px;
border-bottom:1px solid #334155;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<header>
<div>
<h2>📱 SafeKids Monitoring Dashboard</h2>
<p style="color:#94a3b8">Child Device Usage Analytics</p>
</div>

<div id="status">LIVE</div>

</header>


<div class="cards">

<div class="card">
<div>Total Screen Time</div>
<div class="value" id="usage">0</div>
</div>

<div class="card">
<div>Apps Used</div>
<div class="value" id="apps">0</div>
</div>

<div class="card">
<div>Most Used App</div>
<div class="value" id="topApp">--</div>
</div>

<div class="card">
<div>Last Updated</div>
<div class="value" id="updated">--</div>
</div>

</div>

<canvas id="chart"></canvas>

<div class="logs">

<h3>Recent Apps Used</h3>

<div id="logList">
Loading...
</div>

</div>

</div>


<script>

const API_URL =
"https://ozct5tcexuytwcxr7g34yb75ru0juafl.lambda-url.us-east-1.on.aws/ ";

let chart;

async function loadData(){

try{

const res = await fetch(API_URL);
const data = await res.json();

document.getElementById("usage").innerText =
data.totalUsageMinutes+" min";

document.getElementById("apps").innerText =
data.appsUsed;

document.getElementById("topApp").innerText =
data.topApp;

document.getElementById("updated").innerText =
new Date(data.lastUpdated).toLocaleTimeString();

renderLogs(data.recentApps);
renderChart(data.recentApps);

}catch(err){

console.error(err);

}

}


function renderLogs(apps){

const container = document.getElementById("logList");

if(!apps || apps.length===0){

container.innerHTML="No data yet";
return;

}

container.innerHTML = apps.map(a=>`

<div class="log">

<b>${a.app}</b>

<span style="float:right">${a.usageMinutes} min</span>

</div>

`).join("");

}


function renderChart(apps){

const ctx = document.getElementById("chart");

const labels = apps.map(a=>a.app.split(".").pop());

const values = apps.map(a=>a.usageMinutes);

if(chart) chart.destroy();

chart = new Chart(ctx,{

type:"bar",

data:{

labels:labels,

datasets:[{

label:"Usage Minutes",

data:values,

backgroundColor:"#6366f1"

}]

}

});

}


loadData();

setInterval(loadData,5000);

</script>

</body>
</html>
