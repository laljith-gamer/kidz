<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SafeKids AI Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
}

header{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.value{
font-size:28px;
font-weight:bold;
color:#6366f1;
}

.logs{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.log{
padding:10px;
border-bottom:1px solid #334155;
}

.alert{
background:#ef4444;
padding:15px;
border-radius:10px;
margin-bottom:20px;
display:none;
}

</style>

</head>

<body>

<div class="container">

<header>

<h2>🛡 SafeKids AI Monitor</h2>
<p>AI Behavior Monitoring</p>

</header>


<div id="alertBox" class="alert">
⚠ High Risk Behavior Detected
</div>


<div class="cards">

<div class="card">
<div>Total Screen Time</div>
<div class="value" id="usage">0</div>
</div>

<div class="card">
<div>Apps Used</div>
<div class="value" id="apps">0</div>
</div>

<div class="card">
<div>Top App</div>
<div class="value" id="topApp">--</div>
</div>

<div class="card">
<div>AI Risk Level</div>
<div class="value" id="risk">LOW</div>
</div>

<div class="card">
<div>AI Risk Score</div>
<div class="value" id="riskScore">0%</div>
</div>

</div>


<div class="card">

<div>Risk Reason</div>

<div id="riskReason">No risk detected</div>

</div>


<div class="card">

<div>AI Behavior Prediction</div>

<div id="prediction">Loading...</div>

</div>


<canvas id="chart"></canvas>


<div class="logs">

<h3>Recent Apps</h3>

<div id="logList">Loading...</div>

</div>


</div>


<script>

const API_URL =
"https://ozct5tcexuytwcxr7g34yb75ru0juafl.lambda-url.us-east-1.on.aws/";

let chart

async function loadData(){

const res = await fetch(API_URL)

const data = await res.json()

document.getElementById("usage").innerText =
(data.totalUsageMinutes || 0) + " min"

document.getElementById("apps").innerText =
data.appsUsed || 0

document.getElementById("topApp").innerText =
(data.topApp || "").split(".").pop()

document.getElementById("risk").innerText =
data.risk_level || "LOW"

document.getElementById("riskScore").innerText =
((data.risk_score || 0) * 100).toFixed(0) + "%"

document.getElementById("riskReason").innerText =
data.risk_reason || "No risk detected"

document.getElementById("prediction").innerText =
data.prediction || "Prediction unavailable"

document.getElementById("comment").innerText =
data.comment || "Healthy balanced usage"

renderLogs(data.recentApps || [])

renderChart(data.recentApps || [])

}


function renderLogs(apps){

const container =
document.getElementById("logList")

container.innerHTML = apps.map(a=>`

<div class="log">

${a.app}

<span style="float:right">

${a.usageMinutes} min

</span>

</div>

`).join("")

}


function renderChart(apps){

const ctx =
document.getElementById("chart")

const labels =
apps.map(a=>a.app.split(".").pop())

const values =
apps.map(a=>a.usageMinutes)

if(chart) chart.destroy()

chart = new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Usage Minutes",
data:values
}]
}
})

}

loadData()

setInterval(loadData,5000)

</script>

</body>

</html>
