<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>SafeKids AI Monitor</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0b1628;
color:white;
font-family:Arial;
padding:30px;
}

.card{
background:#1b2a40;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

.value{
font-size:26px;
color:#6f7cff;
}

.log{
border-bottom:1px solid #2c3c54;
padding:10px 0;
}

</style>
</head>

<body>

<h2>SafeKids AI Monitor</h2>

<div class="card">
Total Screen Time
<div id="usage" class="value"></div>
</div>

<div class="card">
Apps Used
<div id="apps" class="value"></div>
</div>

<div class="card">
Top App
<div id="topApp" class="value"></div>
</div>

<div class="card">
AI Risk Level
<div id="risk" class="value"></div>
</div>

<div class="card">
AI Risk Score
<div id="riskScore" class="value"></div>
</div>

<div class="card">
Risk Reason
<p id="riskReason"></p>
</div>

<div class="card">
AI Behavior Prediction
<p id="prediction"></p>
</div>

<div class="card">
AI Behaviour Comment
<p id="comment"></p>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Recent Apps</h3>
<div id="logList">Loading...</div>
</div>

<script>

const API_URL =
"https://ozct5tcexuytwcxr7g34yb75ru0juafl.lambda-url.us-east-1.on.aws/"

let chart

function formatAppName(pkg){

if(!pkg) return "Unknown"

const parts = pkg.split(".")

const name = parts[parts.length-1]

return name.charAt(0).toUpperCase()+name.slice(1)

}

function renderLogs(apps){

const container = document.getElementById("logList")

if(!apps || apps.length===0){
container.innerHTML="No recent activity"
return
}

container.innerHTML = apps.map(a=>`

<div class="log">

${formatAppName(a.app)}

<span style="float:right">

${a.usageMinutes} min

</span>

</div>

`).join("")

}

function renderChart(apps){

const ctx = document.getElementById("chart")

if(!apps || apps.length===0) return

const labels = apps.map(a=>formatAppName(a.app))

const values = apps.map(a=>a.usageMinutes)

if(chart) chart.destroy()

chart = new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Usage Minutes",
data:values
}]
}
})

}

async function loadData(){

const res =
await fetch(API_URL+"?t="+Date.now())

const data = await res.json()

document.getElementById("usage").innerText =
(data.totalUsageMinutes||0)+" min"

document.getElementById("apps").innerText =
data.appsUsed||0

document.getElementById("topApp").innerText =
formatAppName(data.topApp)

document.getElementById("risk").innerText =
data.risk_level

document.getElementById("riskScore").innerText =
((data.risk_score||0)*100).toFixed(0)+"%"

document.getElementById("riskReason").innerText =
data.risk_reason

document.getElementById("prediction").innerText =
data.prediction

document.getElementById("comment").innerText =
data.performance_comment

renderLogs(data.recentApps)

renderChart(data.recentApps)

}

loadData()

setInterval(loadData,5000)

</script>

</body>
</html>
